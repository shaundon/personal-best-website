<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {%- seo -%}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preload" href="{{ '/assets/fonts/InterVariable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <script src="{{ '/assets/main.js' | relative_url }}" defer></script>
    {% if page.app_banner %}
    <meta name="apple-itunes-app" content="app-id={{ page.app_banner }}, app-clip-bundle-id={{ page.app_clip }}">
    {% endif %}
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)">
</head>
